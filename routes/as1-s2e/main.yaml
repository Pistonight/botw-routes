- "This route assumes Master Mode. In Normal Mode, you can do the old plat then get Fire+Ice arrows after plat."
- "Normal Mode also has 1 extra step in the middle of IST"
- "For BTB setups please refer to run link (which I will add when I do a run) or the BTB catalog: .link(https://restite.org/btb)"
- "S2E WB Terminology: Walk: walking jump instead of ZL jump. H: The first bomb is required to be delayed and placed very high above the ground (but not too high)"
- "< and > next to an ordinal direction means you would aim at what would be dead angle in s1e. >>> and <<< are similar"
- Buffered ITB require faster inputs and it maybe more consistent to simply release ZR and press A at the same time
